# Server-блоки сайта Ешивы «ХаБаД Ткоа» для ДОБАВЛЕНИЯ в существующий nginx
# соседнего стека (вариант A). Эти блоки дописываются в конец его
# production.conf — существующие блоки чужого продукта НЕ трогаются.
#
# Предполагается, что в том же файле уже объявлены (от соседнего стека):
#   resolver 127.0.0.11 valid=30s ipv6=off;          # docker DNS
#   map $http_upgrade $connection_upgrade { ... }     # для websocket upgrade
# Поэтому здесь они повторно НЕ объявляются.
#
# Бэкенды (web:3000, admin:3001, yeshiva-api:4000) доступны nginx через общую
# сеть web_edge по имени сервиса. proxy_pass через переменную ($up_*) — чтобы
# nginx переразрешал IP после пересборки контейнеров (как в основном конфиге).
#
# ВЫПУСК СЕРТИФИКАТОВ — в два шага (иначе nginx -t упадёт на отсутствующих ssl_*):
#   1) добавить ТОЛЬКО блок "listen 80" ниже, reload nginx;
#   2) certbot certonly --webroot -w /var/www/certbot \
#        -d new.tkoatmimim.com -d admin.tkoatmimim.com -d api.tkoatmimim.com
#   3) добавить блоки "listen 443", reload nginx.

# ── HTTP: ACME-проверка + редирект на HTTPS ───────────────────────────────────
server {
  listen      80;
  server_name new.tkoatmimim.com admin.tkoatmimim.com api.tkoatmimim.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── Публичный сайт (web) ──────────────────────────────────────────────────────
server {
  listen      443 ssl;
  http2       on;
  server_name new.tkoatmimim.com;

  ssl_certificate     /etc/letsencrypt/live/new.tkoatmimim.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/new.tkoatmimim.com/privkey.pem;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Content-Type-Options    "nosniff"                             always;
  add_header X-Frame-Options           "SAMEORIGIN"                          always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

  client_max_body_size 25m;

  location / {
    set $up_web        web;
    proxy_pass         http://$up_web:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
  }
}

# ── Админка (admin) ───────────────────────────────────────────────────────────
server {
  listen      443 ssl;
  http2       on;
  server_name admin.tkoatmimim.com;

  ssl_certificate     /etc/letsencrypt/live/new.tkoatmimim.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/new.tkoatmimim.com/privkey.pem;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Content-Type-Options    "nosniff"                             always;
  add_header X-Frame-Options           "DENY"                                always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

  client_max_body_size 25m;

  location / {
    set $up_admin      admin;
    proxy_pass         http://$up_admin:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
  }
}

# ── API (Express) ─────────────────────────────────────────────────────────────
server {
  listen      443 ssl;
  http2       on;
  server_name api.tkoatmimim.com;

  ssl_certificate     /etc/letsencrypt/live/new.tkoatmimim.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/new.tkoatmimim.com/privkey.pem;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Content-Type-Options    "nosniff"                             always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

  client_max_body_size 25m;

  location / {
    set $up_api        yeshiva-api;
    proxy_pass         http://$up_api:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}
