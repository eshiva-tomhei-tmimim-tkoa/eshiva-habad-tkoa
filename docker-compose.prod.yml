# Прод-стек self-hosted (Docker/VPS): MySQL + api + web + admin + Caddy (TLS).
# Запуск:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: https://${WEB_DOMAIN},https://${ADMIN_DOMAIN}
      UPLOAD_DIR: /app/apps/api/uploads
      WEB_REVALIDATE_URL: http://web:3000/api/revalidate
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      # Платежи Israel Toremet / IsraelGives
      TOREMET_PAY_URL: ${TOREMET_PAY_URL}
      TOREMET_CURRENCY_IDS: ${TOREMET_CURRENCY_IDS:-}
      WEB_PUBLIC_URL: https://${WEB_DOMAIN}
    volumes:
      - uploads:/app/apps/api/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}/api
    restart: unless-stopped
    depends_on: [api]
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      REVALIDATE_SECONDS: ${REVALIDATE_SECONDS:-3600}

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}/api
    restart: unless-stopped
    depends_on: [api]
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [web, admin, api]
    ports:
      - '80:80'
      - '443:443'
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mysql_data:
  uploads:
  caddy_data:
  caddy_config:
